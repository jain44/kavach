<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kavach — MSME Early Warning System | IDBI Innovate 2026</title>
    <meta name="description" content="Kavach is an AI-driven early warning system for MSME loan default prediction, fusing structured financial data with GST signals for 12-month ahead default probability at AUC-ROC ≥ 0.90." />
    <style>
      /* Range input thumb styling across browsers */
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #f59e0b;
        cursor: pointer;
        border: 2px solid #0d0d0d;
        box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
        transition: box-shadow 0.2s;
      }
      input[type='range']::-webkit-slider-thumb:hover {
        box-shadow: 0 0 0 5px rgba(245,158,11,0.25);
      }
      input[type='range']::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #f59e0b;
        cursor: pointer;
        border: 2px solid #0d0d0d;
      }
    </style>
  </head>

    <div id="root"></div>

  </body>
